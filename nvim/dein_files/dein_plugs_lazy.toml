# ======================
# プログラミングサポート
# ======================
# neosnippets
[[plugins]]
repo = 'Shougo/neosnippet.vim'
on_i  = 1
on_ft = ['snippet']
depends = ['neosnippet-snippets']
hook_add = "source ~/.config/nvim/userautoload/plugin-neosnippets.vim"

# neosnippets-snippets
[[plugins]]
repo = 'Shougo/neosnippet-snippets'


# =================
#   Ruby関連
# =================
# Rubyのendを保管する
# vim-endwise
[[plugins]]
repo = 'tpope/vim-endwise'
on_ft = ['ruby', 'elixir', 'eex']

# Rubyのいろいろ
# vim-ruby
[[plugins]]
repo = 'vim-ruby/vim-ruby'
on_ft = ['ruby', 'slim']

# railsのいろいろ
# vim-rails
[[plugins]]
repo = 'tpope/vim-rails'
on_ft = ['ruby', 'slim', 'coffee', 'javascript']

# rspec関係
[[plugins]]
repo = 'Keithbsmiley/rspec.vim'
on_ft = ['ruby']

[[plugins]]
repo = 'thoughtbot/vim-rspec'
on_ft = ['ruby']

# slimのなんやかんや
# vim-slim
[[plugins]]
repo = 'slim-template/vim-slim'
on_ft = ['slim']


# denite-rails
# deniteのrails source
[[plugins]]
repo = '5t111111/denite-rails'
on_ft = ['ruby', 'slim']

# =================
#   JavaScript
#   CoffeeScript
# =================
# mktakuyaのおすすめ
# vim-javascript
[[plugins]]
repo = 'pangloss/vim-javascript'
on_ft = ['javascript', 'coffee']
hook_add='source ~/.config/nvim/userautoload/plugin-vim-javascript.vim'

[[plugins]]
repo = 'jelera/vim-javascript-syntax'
on_ft = ['javascript']

[[plugins]]
repo = 'moll/vim-node'
on_ft = ['javascript']

# CoffeeScriptを書くためのサムシング
[[plugins]]
repo = 'kchmck/vim-coffee-script'
on_ft = ['javascript', 'coffee']

# JSのコードを整形してくれるやつ
[[plugins]]
repo = 'maksimr/vim-jsbeautify'
on_ft = ['javascript']

[[plugins]]
repo = 'heavenshell/vim-jsdoc'
on_ft = ['javascript']


# ================
#   Python
# ================
# jedi-vim
[[plugins]]
repo = 'davidhalter/jedi-vim'
on_ft = ['python']

[[plugins]]
repo = "Vimjas/vim-python-pep8-indent"
on_ft = ['python']

# =================
#   R
# =================
# vim-R-Plugin
# vimをR Studioっぽくするやつ
[[plugins]]
repo = 'vim-scripts/Vim-R-plugin'
on_ft = ['R', 'r']

# =================
#   Elixir
# =================
# シンタックス、ハイライト等
[[plugins]]
repo = 'elixir-lang/vim-elixir'
on_ft = ['elixir', 'eex']

# Phoenix対応
[[plugins]]
repo = 'avdgaag/vim-phoenix'
on_ft = ['elixir', 'eex']

# extest
[[plugins]]
repo = 'BjRo/vim-extest'
on_ft = ['elixir', 'eex']

# mattreduce/vim-mix
[[plugins]]
repo = 'mattreduce/vim-mix'
on_ft = ['elixir', 'eex']

# slashmili/alchemist.vim
[[plugins]]
repo = 'slashmili/alchemist.vim'
depends = 'vim-elixir'
on_ft = ['elixir', 'eex']

# =================
#   Erlang
# =================
# ErlangのOmni補完をサポート
[[plugins]]
repo = 'vim-erlang/vim-erlang-omnicomplete'
on_ft = ['erlang']

# Erlangのシンタックスをサポート
[[plugins]]
repo = 'vim-erlang/vim-erlang-runtime'
on_ft = ['erlang']

# =================
#   HTML
#   CSS
# =================
# HTML5のシンタックスに対応
# html5.vim
[[plugins]]
repo = 'othree/html5.vim'
on_ft= ['html', 'gmarkdown', 'markdown', 'md']

# 閉じタグを良い感じにアレするやつ
# emmet-vim
[[plugins]]
repo = 'mattn/emmet-vim'
on_ft= ['html', 'xml', 'gmarkdown', 'markdown', 'md']

# CSS3のシンタックスに対応
# vim-css3-syntax
[[plugins]]
repo = 'hail2u/vim-css3-syntax'
on_ft= ['html', 'css', 'gmarkdown', 'markdown', 'md']

[[plugins]]
repo = "alexlafroscia/postcss-syntax.vim"
hook_add='source ~/.config/nvim/userautoload/plugin-postcss-syntax.vim'

# =================
#   Markdown
# =================
# Markdownのためのプラグイン
# vim-markdown
[[plugins]]
repo = 'plasticboy/vim-markdown'
on_ft= ['gmarkdown', 'markdown', 'md']
hook_add='source ~/.config/nvim/userautoload/plugin-vim-markdown.vim'

# Vimで文書を書く
# reedes/vim-pencil
[[plugins]]
repo = 'reedes/vim-pencil'
on_ft= ['gmarkdown', 'markdown', 'md']

# Git-Flavored-Markdownをサポートする
[[plugins]]
repo = 'jtratner/vim-flavored-markdown'
on_ft= ['gmarkdown', 'markdown', 'md']

[[plugins]]
repo = 'kannokanno/previm'
on_ft = ['gmarkdown', 'markdown', 'md']

# =================
#   TeX
# =================

# =================
# 	VimScript
# =================
# neco-vim
[[plugins]]
repo = 'Shougo/neco-vim'
on_ft = ['vim']

# =================
#       SQL
# =================
[[plugins]]
repo = 'mattn/vim-sqlfmt'
on_ft = ['sql', 'SQL']


# =================
# toml
# =================
# TOML対応
# toml.vim
[[plugins]]
repo = 'cespare/vim-toml'
on_ft = ['toml']

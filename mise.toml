[tools]
node = "latest"
go = "latest"
python = "latest"
bun = "latest"
ruby = "latest"

[tasks."setup:zsh"]
description = "Setup zsh dotfiles (symlinks to ~/)"
run = """
#!/usr/bin/env bash
set -euo pipefail
source "$MISE_PROJECT_ROOT/scripts/setup_helper.sh"

for f in "$MISE_PROJECT_ROOT/zsh"/.z*; do
    [ -f "$f" ] && link_file "$f" "$HOME/$(basename "$f")"
done

if [ ! -f "$HOME/.zprofile.local" ]; then
    touch "$HOME/.zprofile.local"
    echo -e "\\033[0;32m✓\\033[0m Created: ~/.zprofile.local"
else
    echo -e "\\033[0;32m✓\\033[0m Already exists: ~/.zprofile.local"
fi
"""

[tasks."setup:tmux"]
description = "Setup tmux config (~/.config/tmux)"
run = """
#!/usr/bin/env bash
set -euo pipefail
source "$MISE_PROJECT_ROOT/scripts/setup_helper.sh"

link_dir "$MISE_PROJECT_ROOT/tmux" "${XDG_CONFIG_HOME:-$HOME/.config}/tmux"
"""

